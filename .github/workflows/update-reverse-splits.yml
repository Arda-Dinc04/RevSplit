name: Update reverse split data

on:
  schedule:
    - cron: "45 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Export reverse split JSON
        run: |
          python tools/reverse_split_exporter.py \
            --archive-csv data/reverse-splits-2025.csv \
            --hedgefollow-selenium \
            --output public/data/reverse-splits.json

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/reverse-splits.json
          git diff --staged --quiet || (git commit -m "Update reverse split data" && git push)
